name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
      - name: Lint
        run: python -m ruff check src tests scripts
      - name: Compile examples
        run: |
          python -m ledgerline validate examples/nocturne --json
          python -m ledgerline compile examples/nocturne --json
          python -m ledgerline validate examples/performance-demo --json
          python -m ledgerline compile examples/performance-demo --json
