format: 2
master:
  gain_db: -1.0
  target_lufs: -16.0
  true_peak_ceiling_db: -1.0
  loudness_range_lu: 11.0
  loudness_tolerance_lu: 0.5
  inserts:
    - type: compressor
      threshold_db: -18.0
      ratio: 2.0
      attack_ms: 25.0
      release_ms: 180.0
buses:
  strings:
    output: master
    inserts:
      - type: eq
        highpass_hz: 55.0
        bands:
          - {frequency_hz: 2500.0, gain_db: -1.5, q: 1.2}
  room:
    output: master
    gain_db: -7.0
    inserts:
      - {type: reverb, delays_ms: "40|55", decays: "0.30|0.20"}
tracks:
  piano:
    gain_db: -4.0
    pan: 0.1
    output: master
    sends: {room: -12.0}
  cello:
    gain_db: -3.0
    pan: -0.2
    output: strings
    sends: {room: -10.0}
