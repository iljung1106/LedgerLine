format: 2
master:
  gain_db: -2.0
  target_lufs: -18.0
  true_peak_ceiling_db: -1.0
  loudness_range_lu: 10.0
  loudness_tolerance_lu: 1.0
  inserts:
    - {type: compressor, threshold_db: -16.0, ratio: 1.5, attack_ms: 30.0, release_ms: 220.0}
buses:
  room:
    output: master
    gain_db: -8.0
    inserts:
      - {type: reverb, in_gain: -1.0, out_gain: -2.0, delays_ms: "37|53", decays: "0.28|0.18"}
tracks:
  piano:
    gain_db: -5.0
    pan: 0.12
    output: master
    sends: {room: -14.0}
    inserts:
      - type: eq
        highpass_hz: 35.0
        bands:
          - {frequency_hz: 240.0, gain_db: -1.0, q: 1.0}
  cello:
    gain_db: -4.0
    pan: -0.16
    output: master
    sends: {room: -12.0}
    inserts:
      - type: eq
        highpass_hz: 45.0
        bands:
          - {frequency_hz: 280.0, gain_db: -1.5, q: 1.1}
